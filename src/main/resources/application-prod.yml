spring:
  application:
    name: jwt-spring-security

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/securitydb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}  # NUNCA hardcodear en producción
      expiration: ${JWT_EXPIRATION:900000}  # 15 minutos
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 días

# Logging seguro
logging:
  level:
    com.programandoenjava.jwt: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  # NO loggear información sensible