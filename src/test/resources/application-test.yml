spring:
  datasource:
    url: jdbc:h2:mem:securitydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
      show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console


application:
  security:
    jwt:
      secret-key: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXM=
      expiration: 3600000
      refresh-token:
        expiration: 604800000
